name: API Gateway Mobile Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "api-gateway-mobile/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "api-gateway-mobile/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api-gateway-mobile/requirements.txt

      - name: Install dependencies
        working-directory: ./api-gateway-mobile
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ./api-gateway-mobile
        run: pytest -q
