name: Screenings Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "screenings/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "screenings/**"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: screenings/requirements.txt

      - name: Install dependencies
        working-directory: ./screenings
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ./screenings
        env:
          TEST_MONGODB_URI: mongodb://localhost:27017
        run: pytest -q
