name: Reservations Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'reservations/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'reservations/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: reservations/go.mod

      - name: Run tests
        working-directory: ./reservations
        env:
          TEST_MONGODB_URI: mongodb://localhost:27017
        run: go test ./...
